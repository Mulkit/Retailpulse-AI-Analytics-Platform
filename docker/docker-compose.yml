version: "3.9"

services:
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: retailpulse-dashboard:latest
    container_name: retailpulse_dashboard
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mlflow-ui:
    image: python:3.11-slim
    container_name: retailpulse_mlflow_ui
    working_dir: /app
    volumes:
      - ../mlflow.db:/app/mlflow.db:ro
    command: >
      sh -c "pip install --no-cache-dir mlflow==3.14.0 &&
             mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    restart: unless-stopped
