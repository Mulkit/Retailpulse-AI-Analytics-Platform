apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailpulse-dashboard
  namespace: retailpulse
  labels:
    app: retailpulse-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retailpulse-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: retailpulse-dashboard
    spec:
      containers:
        - name: dashboard
          image: retailpulse-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: retailpulse-config
